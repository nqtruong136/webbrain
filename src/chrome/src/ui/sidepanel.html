<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebBrain</title>
  <link rel="stylesheet" href="../../styles/sidepanel.css">
  <link rel="stylesheet" href="../../vendor/katex/katex.min.css">
  <!-- KaTeX is loaded as classic scripts (not modules). They assign to
       window.katex and window.renderMathInElement so formatMarkdown can
       call them after inserting message HTML. -->
  <script defer src="../../vendor/katex/katex.min.js"></script>
  <script defer src="../../vendor/katex/auto-render.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <select id="provider-select" title="LLM Provider"></select>
        <span id="status-dot" class="status-dot offline" data-i18n-title="sp.status.disconnected"></span>
      </div>
      <div class="header-right">
        <div id="language-wrapper" class="language-wrapper" data-i18n-title="sp.btn.language">
          <svg class="language-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <select id="language-select" data-i18n-aria-label="sp.btn.language"></select>
        </div>
        <button id="btn-verbose" data-i18n-title="sp.btn.verbose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </button>
        <!-- (Recording is now entirely prompt-driven via the agent's
             `record_tab` tool. The live recording banner below the
             header carries its own Stop button, so there's no need for
             a toolbar affordance — keeping both was duplicate UI.) -->
        <button id="btn-settings" data-i18n-title="sp.btn.settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-clear" data-i18n-title="sp.btn.clear">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Inspection Banner -->
    <div id="inspection-banner" class="hidden">
      <div class="inspection-dot"></div>
      <span data-i18n="sp.inspection"></span>
    </div>

    <!-- (Recording options popover removed. Recording is now triggered by
         the agent's `record_tab` tool — e.g. user types "record this
         meeting and transcribe it" and the agent calls the tool with the
         right options. Live banner below is the only post-start UI.) -->

    <div id="recording-banner" class="hidden" role="status" aria-live="polite">
      <span class="recording-dot" aria-hidden="true"></span>
      <span class="recording-label" data-i18n="sp.record.banner_label"></span>
      <span class="recording-timer" id="recording-timer">00:00</span>
      <button id="btn-recording-stop" class="recording-stop" data-i18n="sp.record.stop"></button>
    </div>

    <!-- Chat Messages -->
    <div id="chat-container">
      <div id="messages">
        <div class="message system">
          <div class="message-content">
            <p data-i18n-html="sp.greeting.html"></p>
            <p class="hint" data-i18n="sp.greeting.hint"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Agent Activity Indicator -->
    <div id="agent-activity" class="hidden">
      <div class="activity-spinner"></div>
      <span id="activity-text" data-i18n="sp.activity.thinking"></span>
      <button id="btn-stop" data-i18n-title="sp.btn.stop.title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        <span data-i18n="sp.btn.stop.label"></span>
      </button>
    </div>

    <!-- Act Mode Warning Banner -->
    <div id="act-warning" class="hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span data-i18n="sp.mode.act.warning"></span>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div id="mode-toggle">
        <button id="btn-mode-ask" class="mode-btn active" data-i18n="sp.mode.ask" data-i18n-title="sp.mode.ask.title"></button>
        <button id="btn-mode-act" class="mode-btn" data-i18n="sp.mode.act" data-i18n-title="sp.mode.act.title"></button>
      </div>
      <div id="input-wrapper">
        <textarea id="user-input" data-i18n-placeholder="sp.input.ask_placeholder" rows="1"></textarea>
        <button id="btn-send" data-i18n-title="sp.btn.send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
